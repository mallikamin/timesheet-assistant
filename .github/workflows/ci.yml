name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Syntax + import + smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: poc/requirements.txt

      - name: Install dependencies
        working-directory: poc
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check (compile every .py)
        working-directory: poc
        run: python -m compileall -q .

      - name: Import smoke (PROD mode — Phase 2 routes hidden)
        working-directory: poc
        env:
          ANTHROPIC_API_KEY: ci-dummy-key
          GOOGLE_CLIENT_ID: ci-dummy
          GOOGLE_CLIENT_SECRET: ci-dummy
          HARVEST_CLIENT_ID: ci-dummy
          HARVEST_CLIENT_SECRET: ci-dummy
          SESSION_SECRET: ci-dummy-secret
        run: |
          python -c "import app; print('routes:', len(app.app.routes)); assert app.LOCAL_DEMO_ONLY is False, 'prod mode should hide phase 2'"

      - name: Import smoke (LOCAL_DEMO_ONLY=1 — Phase 2 routes mounted)
        working-directory: poc
        env:
          ANTHROPIC_API_KEY: ci-dummy-key
          LOCAL_DEMO_ONLY: "1"
          GOOGLE_CLIENT_ID: ci-dummy
          GOOGLE_CLIENT_SECRET: ci-dummy
          HARVEST_CLIENT_ID: ci-dummy
          HARVEST_CLIENT_SECRET: ci-dummy
          SESSION_SECRET: ci-dummy-secret
        run: |
          python -c "
          import app
          paths = [r.path for r in app.app.routes if hasattr(r, 'path')]
          assert app.LOCAL_DEMO_ONLY is True
          for p in ('/board', '/dashboard', '/board/project/{project_name}'):
              assert p in paths, f'{p} should be mounted in LOCAL_DEMO_ONLY'
          print(f'phase2 routes mounted: ok ({len(paths)} total routes)')
          "

      - name: HTTP smoke tests (login, health, api/me)
        working-directory: poc
        env:
          ANTHROPIC_API_KEY: ci-dummy-key
          GOOGLE_CLIENT_ID: ci-dummy
          GOOGLE_CLIENT_SECRET: ci-dummy
          HARVEST_CLIENT_ID: ci-dummy
          HARVEST_CLIENT_SECRET: ci-dummy
          SESSION_SECRET: ci-dummy-secret
        run: |
          python -c "
          import asyncio, httpx, app as myapp

          async def go():
              transport = httpx.ASGITransport(app=myapp.app)
              async with httpx.AsyncClient(transport=transport, base_url='http://test') as c:
                  r = await c.get('/login')
                  assert r.status_code == 200, f'/login: {r.status_code}'
                  assert 'text/html' in r.headers['content-type']

                  r = await c.get('/health')
                  assert r.status_code == 200, f'/health: {r.status_code}'
                  body = r.json()
                  assert body['status'] == 'ok'
                  assert body['model'] == 'claude-haiku-4-5-20251001'

                  r = await c.get('/api/me')
                  assert r.status_code == 200
                  assert r.json()['authenticated'] is False

                  r = await c.get('/', follow_redirects=False)
                  assert r.status_code == 307
                  assert '/login' in r.headers['location']
              print('HTTP smoke tests passed')

          asyncio.run(go())
          "
