<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesheet Assistant - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(160deg, #059669 0%, #0d9488 40%, #0891b2 100%);
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 52px 44px;
            width: 390px;
            text-align: center;
        }

        .icon-wrap {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #059669, #0d9488);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 4px 16px rgba(5,150,105,0.3);
        }

        h1 {
            font-size: 23px;
            font-weight: 700;
            color: #064e3b;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .subtitle strong {
            color: #059669;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: #064e3b;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .google-btn:hover {
            background: #065f46;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(6,78,59,0.3);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        .google-btn svg path {
            fill: white;
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #9ca3af;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
            <path d="M5 3h14"/>
            <path d="M5 21h14"/>
            <path d="M7 3v4.5c0 1.5 1 3 2.5 3.8L12 12.5l2.5-1.2C16 10.5 17 9 17 7.5V3"/>
            <path d="M7 21v-4.5c0-1.5 1-3 2.5-3.8l2.5-1.2 2.5 1.2c1.5.8 2.5 2.3 2.5 3.8V21"/>
        </svg>
    </div>
    <h1>Timesheet Assistant</h1>
    <p class="subtitle">Dictate what you worked on.<br><strong>AI logs it in Harvest</strong> for you.</p>

    <a href="/auth/google" class="google-btn">
        <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
    </a>

    <p class="footer">Thrive PR + Communications</p>
</div>

</body>
</html>
